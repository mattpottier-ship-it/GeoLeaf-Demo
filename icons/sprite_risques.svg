<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- =========================================
       BASE ICONS — Risques Inondation France
       ========================================= -->

  <!-- Station hydrométrique (jauge + niveau d'eau) -->
  <symbol id="risques-poi-cat-station" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="7" y="3" width="10" height="18" rx="1.5" />
    <line x1="9" y1="8" x2="11" y2="8" />
    <line x1="9" y1="12" x2="11" y2="12" />
    <line x1="9" y1="16" x2="11" y2="16" />
    <path d="M7 14c2 1 4-1 5 0s3-1 5 0" />
  </symbol>

  <!-- Cours d'eau (vague sinusoïdale) -->
  <symbol id="risques-poi-cat-cours-eau" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9c2-2 4 0 6-2s4 0 6-2 4 0 6-2" />
    <path d="M3 14c2-2 4 0 6-2s4 0 6-2 4 0 6-2" />
    <path d="M3 19c2-2 4 0 6-2s4 0 6-2 4 0 6-2" />
  </symbol>

  <!-- Bassin versant (goutte encadrée) -->
  <symbol id="risques-poi-cat-bassin" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3c-3 5-6 8-6 11a6 6 0 0012 0c0-3-3-6-6-11z" />
    <line x1="9" y1="15" x2="15" y2="15" />
  </symbol>

  <!-- Inondation générique (vagues + flèche montante) -->
  <symbol id="risques-poi-cat-inondation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 16c2-1.5 4 0.5 6-1s4 0.5 6-1 4 0.5 6-1" />
    <path d="M3 20c2-1.5 4 0.5 6-1s4 0.5 6-1 4 0.5 6-1" />
    <polyline points="12 13 12 5 8 9" />
    <line x1="12" y1="5" x2="16" y2="9" />
  </symbol>

  <!-- TRI fréquent (zone hachurée claire) -->
  <symbol id="risques-poi-cat-tri-frequent" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2" />
    <path d="M3 16c2-1 4 0 6-1s4 0 6-1 4 0 6-1" />
    <text x="12" y="11" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">F</text>
  </symbol>

  <!-- TRI centennal (zone hachurée moyenne) -->
  <symbol id="risques-poi-cat-tri-centennal" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2" />
    <path d="M3 14c2-1 4 0 6-1s4 0 6-1 4 0 6-1" />
    <path d="M3 18c2-1 4 0 6-1s4 0 6-1 4 0 6-1" />
    <text x="12" y="11" font-size="6" text-anchor="middle" fill="currentColor" stroke="none">C</text>
  </symbol>

  <!-- TRI extrême (zone hachurée dense) -->
  <symbol id="risques-poi-cat-tri-extreme" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2" />
    <path d="M3 10c2-1 4 0 6-1s4 0 6-1 4 0 6-1" />
    <path d="M3 14c2-1 4 0 6-1s4 0 6-1 4 0 6-1" />
    <path d="M3 18c2-1 4 0 6-1s4 0 6-1 4 0 6-1" />
    <text x="12" y="8" font-size="5" text-anchor="middle" fill="currentColor" stroke="none">X</text>
  </symbol>

  <!-- Risques générique (warning + goutte) -->
  <symbol id="risques-poi-cat-risques-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3L2 20h20L12 3z" />
    <path d="M12 10c-1 2-2 3-2 4.5a2 2 0 004 0c0-1.5-1-2.5-2-4.5z" />
  </symbol>

  <!-- =========================================
       ALIAS CATÉGORIES
       ========================================= -->

  <symbol id="risques-poi-cat-hydrometrie" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-station" />
  </symbol>

  <symbol id="risques-poi-cat-hydrographie" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-cours-eau" />
  </symbol>

  <symbol id="risques-poi-cat-zones_inondables" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-inondation" />
  </symbol>

  <symbol id="risques-poi-cat-hydrometrie-station_active" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-station" />
  </symbol>

  <symbol id="risques-poi-cat-hydrometrie-station_fermee" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-station" />
  </symbol>

  <symbol id="risques-poi-cat-hydrographie-cours_eau" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-cours-eau" />
  </symbol>

  <symbol id="risques-poi-cat-hydrographie-bassin" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-bassin" />
  </symbol>

  <symbol id="risques-poi-cat-zones_inondables-tri_frequent" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-tri-frequent" />
  </symbol>

  <symbol id="risques-poi-cat-zones_inondables-tri_centennal" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-tri-centennal" />
  </symbol>

  <symbol id="risques-poi-cat-zones_inondables-tri_extreme" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-tri-extreme" />
  </symbol>

  <!-- =========================================
       ICÔNE PAR DÉFAUT
       ========================================= -->

  <symbol id="risques-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#risques-poi-cat-risques-generic" />
  </symbol>

</svg>
