<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- =========================================
       BASE ICONS — Guyane Biodiversité
       ========================================= -->

  <!-- Site naturel (montagne + soleil) -->
  <symbol id="guyane-poi-cat-site-naturel" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18l5-8 4 5 3-4 6 7" />
    <circle cx="17" cy="7" r="2.5" />
  </symbol>

  <!-- Randonnée (marcheur) -->
  <symbol id="guyane-poi-cat-randonnee" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="5" r="2" />
    <path d="M9 21l2-7-3-3 3-2" />
    <path d="M15 21l-2-7" />
    <line x1="7" y1="11" x2="11" y2="11" />
    <line x1="11" y1="7" x2="14" y2="4" />
  </symbol>

  <!-- Patrimoine (temple / monument) -->
  <symbol id="guyane-poi-cat-heritage" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 3 4 9 4 19 20 19 20 9" />
    <line x1="8" y1="9" x2="8" y2="19" />
    <line x1="12" y1="9" x2="12" y2="19" />
    <line x1="16" y1="9" x2="16" y2="19" />
    <line x1="3" y1="19" x2="21" y2="19" />
  </symbol>

  <!-- Faune (patte d'animal) -->
  <symbol id="guyane-poi-cat-faune" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="12" cy="14" rx="4" ry="5" />
    <circle cx="7" cy="8" r="1.5" />
    <circle cx="10" cy="5" r="1.5" />
    <circle cx="14" cy="5" r="1.5" />
    <circle cx="17" cy="8" r="1.5" />
  </symbol>

  <!-- Flore (feuille) -->
  <symbol id="guyane-poi-cat-flore" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21c0-6 6-14 8-14-2 0-6 2-8 6-2-4-6-6-8-6 2 0 8 8 8 14z" />
    <line x1="12" y1="13" x2="12" y2="21" />
  </symbol>

  <!-- Zone protégée (bouclier + feuille) -->
  <symbol id="guyane-poi-cat-zone-protegee" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6l7-3z" />
    <path d="M12 10c-1 2-2 3-2 4a2 2 0 004 0c0-1-1-2-2-4z" />
  </symbol>

  <!-- Cours d'eau (vague) -->
  <symbol id="guyane-poi-cat-cours-eau" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9c2-2 4 0 6-2s4 0 6-2 4 0 6-2" />
    <path d="M3 14c2-2 4 0 6-2s4 0 6-2 4 0 6-2" />
    <path d="M3 19c2-2 4 0 6-2s4 0 6-2 4 0 6-2" />
  </symbol>

  <!-- Commune (mairie) -->
  <symbol id="guyane-poi-cat-commune" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="10" width="14" height="10" rx="1" />
    <polygon points="5 10 12 5 19 10" />
    <rect x="10" y="14" width="4" height="6" rx="0.5" />
    <line x1="3" y1="20" x2="21" y2="20" />
  </symbol>

  <!-- Déforestation (arbre abattu) -->
  <symbol id="guyane-poi-cat-deforestation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3c-3 0-6 3-6 7h12c0-4-3-7-6-7z" />
    <line x1="12" y1="10" x2="12" y2="16" />
    <line x1="8" y1="18" x2="16" y2="14" />
    <line x1="5" y1="20" x2="19" y2="20" stroke-dasharray="3 2" />
  </symbol>

  <!-- Tourisme (étoile / POI) -->
  <symbol id="guyane-poi-cat-tourisme" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 3 14.5 9 21 9 16 13.5 18 20 12 16 6 20 8 13.5 3 9 9.5 9" />
  </symbol>

  <!-- Biodiversité (feuille + loupe) -->
  <symbol id="guyane-poi-cat-biodiversite" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 4c-3 3-3 8 0 11s8 3 11 0" />
    <line x1="8" y1="4" x2="8" y2="10" />
    <circle cx="14" cy="12" r="4" />
    <line x1="17" y1="15" x2="20" y2="18" />
  </symbol>

  <!-- Guyane générique (palmier) -->
  <symbol id="guyane-poi-cat-guyane-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="10" x2="12" y2="21" />
    <path d="M12 10c-3-2-7-1-9 1 3-1 6 0 9-1z" />
    <path d="M12 10c3-2 7-1 9 1-3-1-6 0-9-1z" />
    <path d="M12 10c-1-3-1-7 1-9 0 3 0 6-1 9z" />
    <line x1="8" y1="21" x2="16" y2="21" />
  </symbol>

  <!-- =========================================
       ALIAS CATÉGORIES
       ========================================= -->

  <symbol id="guyane-poi-cat-tourisme-site_naturel" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-site-naturel" />
  </symbol>

  <symbol id="guyane-poi-cat-tourisme-randonnee" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-randonnee" />
  </symbol>

  <symbol id="guyane-poi-cat-tourisme-heritage" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-heritage" />
  </symbol>

  <symbol id="guyane-poi-cat-biodiversite-faune" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-faune" />
  </symbol>

  <symbol id="guyane-poi-cat-biodiversite-flore" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-flore" />
  </symbol>

  <symbol id="guyane-poi-cat-biodiversite-zone_protegee" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-zone-protegee" />
  </symbol>

  <symbol id="guyane-poi-cat-territoire" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-commune" />
  </symbol>

  <symbol id="guyane-poi-cat-territoire-commune" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-commune" />
  </symbol>

  <symbol id="guyane-poi-cat-territoire-deforestation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-deforestation" />
  </symbol>

  <symbol id="guyane-poi-cat-territoire-hydrographie" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-cours-eau" />
  </symbol>

  <!-- =========================================
       ICÔNE PAR DÉFAUT
       ========================================= -->

  <symbol id="guyane-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#guyane-poi-cat-guyane-generic" />
  </symbol>

</svg>
