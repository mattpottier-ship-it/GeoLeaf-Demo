<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- =========================================
       BASE ICONS — Réseau ferroviaire France
       ========================================= -->

  <!-- Gare (bâtiment + horloge) -->
  <symbol id="rail-poi-cat-gare" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="8" width="14" height="10" rx="1.5" />
    <polygon points="5 8 12 4 19 8" />
    <circle cx="12" cy="12" r="2" />
    <line x1="12" y1="11" x2="12" y2="12" />
    <line x1="12" y1="12" x2="13" y2="12.5" />
    <line x1="5" y1="18" x2="19" y2="18" />
  </symbol>

  <!-- Train (wagon simplifié) -->
  <symbol id="rail-poi-cat-train" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="7" width="16" height="9" rx="2" />
    <circle cx="8" cy="18" r="1.5" />
    <circle cx="16" cy="18" r="1.5" />
    <line x1="12" y1="7" x2="12" y2="16" />
    <rect x="6" y="9" width="4" height="3" rx="0.5" />
    <rect x="14" y="9" width="4" height="3" rx="0.5" />
  </symbol>

  <!-- Voie ferrée (rails parallèles) -->
  <symbol id="rail-poi-cat-voie-ferree" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <line x1="8" y1="4" x2="8" y2="20" />
    <line x1="16" y1="4" x2="16" y2="20" />
    <line x1="8" y1="7" x2="16" y2="7" />
    <line x1="8" y1="11" x2="16" y2="11" />
    <line x1="8" y1="15" x2="16" y2="15" />
    <line x1="8" y1="19" x2="16" y2="19" />
  </symbol>

  <!-- Route (route + flèche) -->
  <symbol id="rail-poi-cat-route" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 20c2-4 3-8 6-12s4-4 6-4" />
    <polyline points="15 3 18 4 17 7" />
    <line x1="10" y1="12" x2="10" y2="14" stroke-dasharray="1 2" />
    <line x1="8" y1="16" x2="8" y2="18" stroke-dasharray="1 2" />
  </symbol>

  <!-- Desserte (zone hachurée / rayon) -->
  <symbol id="rail-poi-cat-desserte" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8" stroke-dasharray="3 2" />
    <circle cx="12" cy="12" r="3" />
    <line x1="12" y1="9" x2="12" y2="4" />
    <line x1="15" y1="12" x2="20" y2="12" />
  </symbol>

  <!-- Rail générique (locomotive) -->
  <symbol id="rail-poi-cat-rail-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="6" width="14" height="10" rx="2" />
    <circle cx="8" cy="18" r="1.5" />
    <circle cx="16" cy="18" r="1.5" />
    <rect x="7" y="8" width="4" height="3" rx="0.5" />
    <path d="M15 8l3 0 1 3h-4z" />
    <line x1="4" y1="20" x2="20" y2="20" />
  </symbol>

  <!-- =========================================
       CATÉGORIES
       ========================================= -->

  <symbol id="rail-poi-cat-ferroviaire" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-gare" />
  </symbol>

  <symbol id="rail-poi-cat-routier" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-route" />
  </symbol>

  <symbol id="rail-poi-cat-desserte-cat" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-desserte" />
  </symbol>

  <!-- Sous-catégories -->

  <symbol id="rail-poi-cat-ferroviaire-gare_tgv" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-gare" />
  </symbol>

  <symbol id="rail-poi-cat-ferroviaire-gare_ter" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-gare" />
  </symbol>

  <symbol id="rail-poi-cat-ferroviaire-gare_regionale" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-gare" />
  </symbol>

  <symbol id="rail-poi-cat-ferroviaire-ligne" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-voie-ferree" />
  </symbol>

  <symbol id="rail-poi-cat-routier-route_nationale" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-route" />
  </symbol>

  <symbol id="rail-poi-cat-routier-autoroute" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-route" />
  </symbol>

  <symbol id="rail-poi-cat-desserte-zone_desserte" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-desserte" />
  </symbol>

  <!-- =========================================
       ICÔNE PAR DÉFAUT
       ========================================= -->

  <symbol id="rail-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#rail-poi-cat-rail-generic" />
  </symbol>

</svg>
