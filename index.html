<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>GeoLeaf – Official Demo</title>
        <link rel="icon" type="image/x-icon" href="icons/fav.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- PWA -->
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#2d6a4f">
        <!-- iOS/Android PWA -->
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="apple-mobile-web-app-title" content="GeoLeaf">
        <link rel="apple-touch-icon" href="icons/icon-192.png">

        <!-- Cache headers managed by server in production -->

        <!-- Security Headers — validated for MapLibre GL JS v5 (no unsafe-eval needed) -->
        <meta http-equiv="Content-Security-Policy"
            content="default-src 'self';
                    script-src 'self' https://unpkg.com blob: 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE=';
                    style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
                    img-src 'self' data: https:;
                    connect-src 'self' https:;
                    font-src 'self' data: https://fonts.gstatic.com;
                    worker-src 'self' blob:;
                    child-src blob:;
                    object-src 'none';
                    base-uri 'self';
                    form-action 'self';
                    upgrade-insecure-requests;">

        <meta http-equiv="X-Content-Type-Options" content="nosniff">
        <meta name="referrer" content="strict-origin-when-cross-origin">

        <!-- Google Fonts - Open Sans -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

        <!-- GeoLeaf CSS (core package) -->
        <link rel="stylesheet" href="dist/geoleaf-main.min.css" />
    </head>
    <body class="gl-theme-dark">
        <!-- Spinner CSS — hidden automatically by GeoLeaf.boot() via geoleaf:map:ready -->
        <div id="gl-loader"></div>

        <div class="gl-page">

            <!-- DEMO ONLY — Remove this container for production projects -->
            <div id="demo-header-container"></div>

            <!-- Contenu principal -->
            <main class="gl-main">
                <!-- Filter panel toggle button -->
                <button id="gl-filter-toggle"
                        class="gl-filter-toggle"
                        data-gl-role="filter-toggle"
                        aria-label="Open filter panel"
                        title="Filters">
                    <span class="gl-filter-toggle__icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 6l6 6-6 6"></path>
                    </svg>
                    </span>
                </button>

                <!-- Side filter panel -->
                <aside id="gl-filter-panel" class="gl-filter-panel" role="complementary" aria-label="Filter panel">
                    <!-- Content will be dynamically generated by GeoLeaf.UI.buildFilterPanelFromActiveProfile() -->
                </aside>

                <!-- Containers for the theme selector -->
                <div id="gl-theme-primary-container"></div>
                <div id="gl-theme-secondary-container"></div>

                <!-- Carte MapLibre -->
                <div id="geoleaf-map" class="gl-map"></div>
            </main>

        </div>

        <!-- MapLibre GL JS v5 (WebGL rendering engine) -->
        <link
            href="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.css"
            rel="stylesheet"
            crossorigin="anonymous"
        />
        <script
            src="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.js"
            crossorigin="anonymous"
        ></script>

        <!-- GeoLeaf JS - ESM Bundle core -->
        <script type="module" src="dist/geoleaf.esm.js?v=1778422794000"></script>

        <!-- Standard MIT plugins (ESM — load BEFORE GeoLeaf.boot()) -->
        <script type="module" src="dist/geoleaf-connector.plugin.js"></script>
        <script type="module" src="dist/geoleaf-websocket.plugin.js"></script>
        <script type="module" src="dist/geoleaf-realtime-layer.plugin.js"></script>
        <script type="module" src="dist/geoleaf-file-import.plugin.js"></script>
        <script type="module" src="dist/geoleaf-flatgeobuf.plugin.js"></script>

        <!-- Optional premium plugins — DEMO ONLY: remove if unused -->

        <!-- DEMO ONLY — Remove this script for production projects -->
        <script type="module" src="demo/demo.extensions.js"></script>

        <!-- Init: header loading + GeoLeaf bootstrap (external for CSP) -->
        <!-- DEMO ONLY: replace with your own init script -->
        <script type="module" src="init.js"></script>
    </body>
</html>
