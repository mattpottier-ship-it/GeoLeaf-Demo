<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- =========================================
       BASE ICONS — Catastrophes naturelles
       ========================================= -->

  <!-- Séisme (ondes concentriques) -->
  <symbol id="disasters-poi-cat-seisme" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="2" />
    <path d="M12 12m-5 0a5 5 0 1 0 10 0a5 5 0 1 0-10 0" opacity="0.6" />
    <path d="M12 12m-8 0a8 8 0 1 0 16 0a8 8 0 1 0-16 0" opacity="0.3" />
    <path d="M8 16l2-4 2 3 2-5 2 6" />
  </symbol>

  <!-- ShakeMap / zone d'impact (cercle + zigzag) -->
  <symbol id="disasters-poi-cat-shakemap" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9" stroke-dasharray="3 2" />
    <circle cx="12" cy="12" r="5" stroke-dasharray="3 2" />
    <path d="M8 12l2-3 2 4 2-4 2 3" />
  </symbol>

  <!-- Cyclone (spirale) -->
  <symbol id="disasters-poi-cat-cyclone" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="2" />
    <path d="M14 10c2-3 5-3 6-1" />
    <path d="M10 10c-1-3-4-4-6-2" />
    <path d="M10 14c-2 3-5 3-6 1" />
    <path d="M14 14c1 3 4 4 6 2" />
  </symbol>

  <!-- Inondation (vagues montantes) -->
  <symbol id="disasters-poi-cat-inondation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18c1.5-.8 3-1 4.5-1s3 .2 4.5 1 3 1 4.5 1" />
    <path d="M3 14c1.5-.8 3-1 4.5-1s3 .2 4.5 1 3 1 4.5 1" />
    <path d="M3 10c1.5-.8 3-1 4.5-1s3 .2 4.5 1 3 1 4.5 1" />
    <path d="M12 4v3" />
    <polyline points="10 5 12 3 14 5" />
  </symbol>

  <!-- Volcan (triangle + éruption) -->
  <symbol id="disasters-poi-cat-volcan" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <polygon points="5 19 10 9 14 9 19 19" />
    <path d="M11 5l1-2 1 2" />
    <path d="M9 6l-1-1" />
    <path d="M15 6l1-1" />
  </symbol>

  <!-- Tectonique (faille brisée) -->
  <symbol id="disasters-poi-cat-tectonique" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12l4-2 3 4 4-6 3 4 4-2" />
    <path d="M7 16l2 3" />
    <path d="M15 16l2 3" />
    <path d="M9 5l1 3" />
    <path d="M14 5l1 3" />
  </symbol>

  <!-- Alerte générique (triangle + exclamation) -->
  <symbol id="disasters-poi-cat-alerte-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 3 22 20 2 20" />
    <line x1="12" y1="9" x2="12" y2="14" />
    <circle cx="12" cy="17" r="0.5" fill="currentColor" />
  </symbol>

  <!-- =========================================
       CATÉGORIES
       ========================================= -->

  <symbol id="disasters-poi-cat-seismes" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-seisme" />
  </symbol>

  <symbol id="disasters-poi-cat-cyclones" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-cyclone" />
  </symbol>

  <symbol id="disasters-poi-cat-inondations" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-inondation" />
  </symbol>

  <symbol id="disasters-poi-cat-volcans" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-volcan" />
  </symbol>

  <!-- Sous-catégories -->

  <symbol id="disasters-poi-cat-seismes-epicentre" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-seisme" />
  </symbol>

  <symbol id="disasters-poi-cat-seismes-shakemap" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-shakemap" />
  </symbol>

  <symbol id="disasters-poi-cat-cyclones-position" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-cyclone" />
  </symbol>

  <symbol id="disasters-poi-cat-cyclones-trajectoire" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-cyclone" />
  </symbol>

  <symbol id="disasters-poi-cat-inondations-zone_inondee" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-inondation" />
  </symbol>

  <symbol id="disasters-poi-cat-volcans-volcan_actif" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-volcan" />
  </symbol>

  <symbol id="disasters-poi-cat-volcans-plaque" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-tectonique" />
  </symbol>

  <!-- =========================================
       ICÔNE PAR DÉFAUT
       ========================================= -->

  <symbol id="disasters-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#disasters-poi-cat-alerte-generic" />
  </symbol>

</svg>
