<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- =========================================
       BASE ICONS — Urbanisme & BTP
       ========================================= -->

  <!-- Permis de construire (document + check) -->
  <symbol id="urbanisme-poi-cat-permis" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="3" width="14" height="18" rx="1.5" />
    <line x1="8" y1="8" x2="16" y2="8" />
    <line x1="8" y1="11" x2="14" y2="11" />
    <line x1="8" y1="14" x2="12" y2="14" />
    <polyline points="13 17 15 19 19 15" />
  </symbol>

  <!-- Rénovation (maison + flèche circulaire) -->
  <symbol id="urbanisme-poi-cat-renovation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <polygon points="5 12 12 5 19 12" />
    <rect x="7" y="12" width="10" height="8" rx="1" />
    <path d="M16 3a5 5 0 01-2 8" />
    <polyline points="14 10 14 11.5 15.5 11" />
  </symbol>

  <!-- Voirie (route + marquage) -->
  <symbol id="urbanisme-poi-cat-voirie" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 4l2 16" />
    <path d="M18 4l-2 16" />
    <line x1="12" y1="5" x2="12" y2="8" stroke-dasharray="2 2" />
    <line x1="12" y1="11" x2="12" y2="14" stroke-dasharray="2 2" />
    <line x1="12" y1="17" x2="12" y2="20" stroke-dasharray="2 2" />
  </symbol>

  <!-- Chantier (cône de signalisation) -->
  <symbol id="urbanisme-poi-cat-chantier" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 20l3-16 3 16" />
    <line x1="4" y1="20" x2="20" y2="20" />
    <line x1="10" y1="12" x2="14" y2="12" />
    <line x1="9.5" y1="16" x2="14.5" y2="16" />
  </symbol>

  <!-- Bâtiment (immeuble) -->
  <symbol id="urbanisme-poi-cat-batiment" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="6" width="16" height="14" rx="1" />
    <rect x="7" y="9" width="3" height="3" rx="0.5" />
    <rect x="14" y="9" width="3" height="3" rx="0.5" />
    <rect x="7" y="14" width="3" height="3" rx="0.5" />
    <rect x="14" y="14" width="3" height="3" rx="0.5" />
    <line x1="4" y1="6" x2="20" y2="6" />
  </symbol>

  <!-- PLU (zone réglementaire) -->
  <symbol id="urbanisme-poi-cat-plu" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="4" width="16" height="16" rx="2" stroke-dasharray="3 2" />
    <text x="12" y="14" font-size="7" text-anchor="middle" fill="currentColor" stroke="none">PLU</text>
  </symbol>

  <!-- DPE (thermomètre + maison) -->
  <symbol id="urbanisme-poi-cat-dpe" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="10" y="3" width="4" height="14" rx="2" />
    <circle cx="12" cy="18" r="3" />
    <line x1="12" y1="10" x2="12" y2="15" />
    <line x1="14" y1="7" x2="16" y2="7" />
    <line x1="14" y1="10" x2="16" y2="10" />
    <line x1="14" y1="13" x2="16" y2="13" />
  </symbol>

  <!-- Urbanisme générique (grue) -->
  <symbol id="urbanisme-poi-cat-urbanisme-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <line x1="10" y1="4" x2="10" y2="20" />
    <line x1="6" y1="20" x2="14" y2="20" />
    <line x1="10" y1="4" x2="20" y2="4" />
    <line x1="20" y1="4" x2="20" y2="8" />
    <line x1="10" y1="4" x2="6" y2="8" />
    <line x1="10" y1="10" x2="14" y2="4" />
  </symbol>

  <!-- =========================================
       ALIAS CATÉGORIES
       ========================================= -->

  <symbol id="urbanisme-poi-cat-permis-permis_neuf" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-permis" />
  </symbol>

  <symbol id="urbanisme-poi-cat-permis-permis_renovation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-renovation" />
  </symbol>

  <symbol id="urbanisme-poi-cat-infrastructure" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-voirie" />
  </symbol>

  <symbol id="urbanisme-poi-cat-infrastructure-voirie" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-voirie" />
  </symbol>

  <symbol id="urbanisme-poi-cat-infrastructure-chantier" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-chantier" />
  </symbol>

  <symbol id="urbanisme-poi-cat-batiments" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-batiment" />
  </symbol>

  <symbol id="urbanisme-poi-cat-reglementation" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-plu" />
  </symbol>

  <symbol id="urbanisme-poi-cat-energie" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-dpe" />
  </symbol>

  <!-- =========================================
       ICÔNE PAR DÉFAUT
       ========================================= -->

  <symbol id="urbanisme-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#urbanisme-poi-cat-urbanisme-generic" />
  </symbol>

</svg>
