<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- =========================================
       BASE ICONS
       ========================================= -->

  <!-- Générique transport -->
  <symbol id="transport-poi-cat-transport-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="7" cy="17" r="2" />
    <circle cx="17" cy="17" r="2" />
    <path d="M5 17H3V9l4-3h10l4 3v8h-2" />
    <path d="M9 17h6" />
  </symbol>

  <!-- Avion -->
  <symbol id="transport-poi-cat-transport-plane" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15l-5-5L20 5l-2-1-6 6-5-3-1.5 1.5L9 12l-3 3 1.5 1.5 3-1 3.5 4.5L15.5 20l-1-5 6-6z" />
  </symbol>

  <!-- Navire / bateau -->
  <symbol id="transport-poi-cat-transport-ship" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 14l2-7h10l2 7z" />
    <path d="M3 17c1 .8 2 1.1 3 1.1s2-.3 3-1.1 2-1.1 3-1.1 2 .3 3 1.1 2 1.1 3 1.1" />
    <line x1="12" y1="7" x2="12" y2="4" />
    <line x1="9" y1="4" x2="15" y2="4" />
  </symbol>

  <!-- Port maritime (ancre) -->
  <symbol id="transport-poi-cat-maritime-port" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="6" r="2" />
    <line x1="12" y1="8" x2="12" y2="19" />
    <path d="M6 12h12" />
    <path d="M6 19c0-2 2.7-3 6-3s6 1 6 3" />
  </symbol>

  <!-- Aéroport (tour de contrôle) -->
  <symbol id="transport-poi-cat-aerien-aeroport" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="10" y="11" width="4" height="9" />
    <path d="M8 11h8l-1-5h-6z" />
    <path d="M12 6V4" />
    <path d="M6 8c1.5-1 3.5-1.5 6-1.5s4.5.5 6 1.5" />
    <line x1="7" y1="20" x2="17" y2="20" />
  </symbol>

  <!-- Ville / capitale (bâtiments) -->
  <symbol id="transport-poi-cat-ville-city" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="10" width="5" height="9" />
    <rect x="10" y="6" width="5" height="13" />
    <rect x="17" y="8" width="4" height="11" />
    <line x1="3" y1="19" x2="21" y2="19" />
  </symbol>

  <!-- Route / itinéraire (ligne avec flèche) -->
  <symbol id="transport-poi-cat-route-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 12h16" />
    <polyline points="15 8 19 12 15 16" />
    <path d="M4 6v12" stroke-dasharray="2 2" />
  </symbol>

  <!-- Route maritime (vague + flèche) -->
  <symbol id="transport-poi-cat-route-maritime" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10c1 .8 2 1 3 1s2-.2 3-1 2-1 3-1 2 .2 3 1 2 1 3 1" />
    <path d="M3 15c1 .8 2 1 3 1s2-.2 3-1 2-1 3-1 2 .2 3 1 2 1 3 1" />
    <polyline points="16 7 20 10 16 13" />
  </symbol>

  <!-- Route aérienne (trajectoire + avion) -->
  <symbol id="transport-poi-cat-route-aerienne" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 18 Q12 6 20 8" stroke-dasharray="3 2" />
    <path d="M18 5l3 3-3 1z" fill="currentColor" stroke="none" />
  </symbol>

  <!-- Navire RT (position live) -->
  <symbol id="transport-poi-cat-rt-navire" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 15l3-9 3 4 3-4 3 9z" />
    <path d="M3 18c1 .8 2 1 3 1s2-.2 3-1 2-1 3-1 2 .2 3 1 2 1 3 1" />
  </symbol>

  <!-- Avion RT (position live) -->
  <symbol id="transport-poi-cat-rt-avion" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z" />
  </symbol>

  <!-- =========================================
       CATÉGORIES MARITIMES
       ========================================= -->

  <symbol id="transport-poi-cat-maritime" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-transport-ship" />
  </symbol>

  <symbol id="transport-poi-cat-maritime-navire" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-transport-ship" />
  </symbol>

  <!-- =========================================
       CATÉGORIES AÉRIENNES
       ========================================= -->

  <symbol id="transport-poi-cat-aerien" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-transport-plane" />
  </symbol>

  <symbol id="transport-poi-cat-aerien-avion" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-transport-plane" />
  </symbol>

  <!-- =========================================
       CATÉGORIES VILLES
       ========================================= -->

  <symbol id="transport-poi-cat-ville" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-ville-city" />
  </symbol>

  <symbol id="transport-poi-cat-ville-capitale" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-ville-city" />
  </symbol>

  <symbol id="transport-poi-cat-ville-grande_ville" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-ville-city" />
  </symbol>

  <!-- =========================================
       ICÔNE PAR DÉFAUT
       ========================================= -->

  <symbol id="transport-generic" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.7" fill="none"
          stroke-linecap="round" stroke-linejoin="round">
    <use href="#transport-poi-cat-transport-generic" />
  </symbol>

</svg>
